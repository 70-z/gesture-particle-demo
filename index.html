<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 手势粒子系统</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main id="app">
      <video id="camera" playsinline muted></video>
      <canvas id="scene"></canvas>

      <section class="hud" aria-label="粒子系统状态">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <strong>实时 3D 粒子系统</strong>
            <span>识别到两只手进入/退出相册，相册内 1-4 切图</span>
          </div>
        </div>

        <div class="status-grid">
          <div>
            <span>摄像头</span>
            <strong id="cameraStatus">等待授权</strong>
          </div>
          <div>
            <span>手势</span>
            <strong id="gestureStatus">识别中</strong>
          </div>
          <div>
            <span>粒子状态</span>
            <strong id="motionStatus">呼吸</strong>
          </div>
          <div>
            <span>诊断</span>
            <strong id="debugStatus">待检测</strong>
          </div>
        </div>
      </section>

      <section class="control-panel" aria-label="演示控制">
        <button id="textOne" type="button" aria-label="切换到青年才俊">1</button>
        <button id="textTwo" type="button" aria-label="切换到才智超群">2</button>
        <button id="galleryButton" type="button" aria-label="切换相册">相册</button>
        <button id="cameraRetry" type="button" aria-label="重新连接摄像头">摄像头</button>
        <label>
          <span>扩散</span>
          <input id="spreadControl" type="range" min="0" max="100" value="36" />
        </label>
      </section>

      <section id="gallery" class="gallery" aria-label="相册" aria-hidden="true">
        <button id="galleryPrev" class="gallery-nav prev" type="button" aria-label="上一张">‹</button>
        <figure class="gallery-frame">
          <img id="galleryImage" alt="相册照片" />
          <figcaption>
            <strong>相册</strong>
            <span id="galleryCounter">1 / 4</span>
          </figcaption>
        </figure>
        <button id="galleryNext" class="gallery-nav next" type="button" aria-label="下一张">›</button>
      </section>

      <div id="toast" role="status"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="./src/main.js?v=16"></script>
  </body>
</html>
