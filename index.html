<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>青年才俊</title>
    <link rel="stylesheet" href="./src/styles.css?v=29" />
  </head>
  <body>
    <main id="app">
      <div id="cameraPreview" class="camera-preview">
        <div class="camera-preview-actions">
          <button
            id="cameraPreviewToggle"
            class="camera-preview-toggle"
            type="button"
            aria-controls="camera"
            aria-expanded="true"
            aria-label="收起摄像头画面"
          >收起</button>
          <button
            id="cameraCheck"
            class="camera-check"
            type="button"
            aria-label="检查摄像头连接"
          >检查</button>
        </div>
        <video id="camera" playsinline muted></video>
      </div>
      <canvas id="scene"></canvas>

      <section class="hud" aria-label="粒子系统状态">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <strong>青年才俊</strong>
            <span>点击进入相册，选择文件夹上传照片</span>
          </div>
        </div>

        <div id="statusPanel" class="status-panel">
          <button
            id="statusToggle"
            class="status-toggle"
            type="button"
            aria-controls="statusGrid"
            aria-expanded="true"
            aria-label="收起状态栏"
          >收起</button>
          <div id="statusGrid" class="status-grid">
            <div>
              <span>摄像头</span>
              <strong id="cameraStatus">等待授权</strong>
            </div>
            <div>
              <span>手势</span>
              <strong id="gestureStatus">识别中</strong>
            </div>
            <div>
              <span>粒子状态</span>
              <strong id="motionStatus">呼吸</strong>
            </div>
            <div>
              <span>诊断</span>
              <strong id="debugStatus">待检测</strong>
            </div>
          </div>
        </div>
      </section>

      <section class="control-panel" aria-label="演示控制">
        <button id="textOne" type="button" aria-label="切换到青年才俊">1</button>
        <button id="textTwo" type="button" aria-label="切换到苏音唯美，爱泷不悔">2</button>
        <button id="numberThree" type="button" aria-label="切换到 Silence牛逼克拉斯">3</button>
        <button id="defaultGalleryButton" type="button" aria-label="打开相册">相册</button>
        <button id="cameraRetry" type="button" aria-label="打开摄像头画面">摄像头</button>
        <button id="featureButton" type="button" aria-label="打开功能面板">功能</button>
        <label>
          <span>扩散</span>
          <input id="spreadControl" type="range" min="0" max="100" value="36" />
        </label>
      </section>

      <section id="featurePanel" class="feature-panel" aria-label="功能面板" aria-hidden="true">
        <button data-feature-shape="heart" type="button">爱心</button>
        <button data-feature-shape="lightning" type="button">闪电</button>
        <button data-feature-shape="crystal" type="button">桃心晶体</button>
        <button data-feature-shape="tomorrow" type="button">明日世界</button>
        <button data-feature-shape="dragon" type="button">素龙</button>
        <button data-feature-shape="sphere" type="button">球体</button>
        <button id="featureExit" type="button">退出</button>
      </section>

      <section id="gallery" class="gallery" aria-label="相册" aria-hidden="true">
        <button id="galleryPrev" class="gallery-nav prev" type="button" aria-label="上一张">‹</button>
        <div class="gallery-layout">
          <figure class="gallery-frame">
            <img id="galleryImage" alt="相册照片" />
            <p id="galleryEmpty">相册</p>
            <figcaption>
              <strong id="galleryTitle">相册</strong>
              <span id="galleryCounter">1 / 4</span>
            </figcaption>
          </figure>
          <div class="gallery-tools" aria-label="相册管理">
            <div id="folderTabs" class="folder-tabs" aria-label="相册文件夹"></div>
            <div class="gallery-actions">
              <select id="folderSelect" aria-label="选择上传文件夹"></select>
              <button id="newFolderButton" type="button" aria-label="新建相册文件夹">新建</button>
              <button id="authButton" type="button" aria-label="设置 GitHub 上传授权">授权</button>
              <button id="cjUploadButton" type="button" aria-label="上传照片">上传</button>
              <button id="deletePhotoButton" type="button" aria-label="删除当前照片">删除</button>
              <button id="exitGallery" type="button" aria-label="退出相册">退出</button>
            </div>
          </div>
          <input id="cjUpload" class="upload-input" type="file" accept="image/*" multiple />
        </div>
        <button id="galleryNext" class="gallery-nav next" type="button" aria-label="下一张">›</button>
      </section>

      <div id="toast" role="status"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="./src/main.js?v=35"></script>
  </body>
</html>
